compute:
  device: "cpu"
  num_workers: 1
  max_parallel_games: 1

model:
  vocab_size: 1000
  action_vocab_size: 260
  phase_vocab_size: 4
  hidden_dim: 64
  num_layers: 2
  num_heads: 2
  dropout: 0.1
  max_seq_len: 256
  use_auxiliary_heads: false

selfplay:
  num_episodes: 1
  max_steps: 64
  seed: 17
  seed_sequence:
    - 17
  output_path: "replays/smoke_rating/latest.json"
  checkpoint: null
  determinization_count: 1
  num_determinizations: 1
  search_simulations: 0
  rollout_depth: 1
  use_search: false
  use_model_logits: true
  keep_last_shards: 4

storage:
  replay_dir: "replays/smoke_rating"
  checkpoint_dir: "checkpoints/smoke_rating"
  artifacts_dir: "artifacts/smoke_rating"
  manifest_path: "artifacts/smoke_rating/manifest.json"

training:
  epochs: 1
  batch_size: 8
  iterations: 1
  lr: 0.0001
  replay_path: "replays/smoke_rating/latest.json"
  init_checkpoint: null
  checkpoint_name: "latest.pt"
  ckpt_dir: "checkpoints/smoke_rating"
  checkpoint_every: 0
  snapshot_every: 0
  save_final_snapshot: true
  device: "cpu"
  online_refresh: false
  online_refresh_every: 1
  resume_latest: true
  replay_window_shards: 2
  replay_window_items: 0

evaluation:
  rounds: 1
  seed: 5000
  seed_sequence:
    - 5000
  checkpoint: "checkpoints/latest.pt"
  baseline_checkpoint: null
  use_search: false
  search_simulations: 0
  rollout_depth: 1
  num_determinizations: 1
  seed_steps: 200
  mode: "auto"
  suite_name: "quick"
  opponent_pool_size: 2
  include_anchor: true
  include_previous_snapshot: true
  duplicate_draw_margin: 0.0
  rating_k_factor: 24.0

pipeline:
  iterations: 2
