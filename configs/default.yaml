model:
  vocab_size: 5000
  action_vocab_size: 260
  phase_vocab_size: 4
  hidden_dim: 256
  num_layers: 6
  num_heads: 8
  dropout: 0.1
  max_seq_len: 512
  use_auxiliary_heads: false

selfplay:
  num_episodes: 8
  max_steps: 120
  seed: 42
  seed_sequence: []
  output_path: "replays/latest.json"
  checkpoint: null
  determinization_count: 8
  search_simulations: 12
  rollout_depth: 16
  use_search: true
  use_model_logits: true
  keep_last_shards: 8

storage:
  replay_dir: "replays"
  checkpoint_dir: "checkpoints"
  artifacts_dir: "artifacts"
  manifest_path: "artifacts/manifest.json"

training:
  epochs: 3
  batch_size: 32
  iterations: 1
  lr: 0.0001
  replay_path: "replays/latest.json"
  init_checkpoint: null
  checkpoint_name: "latest.pt"
  ckpt_dir: "checkpoints"
  checkpoint_every: 0
  snapshot_every: 0
  save_final_snapshot: true
  device: "cpu"
  online_refresh: false
  online_refresh_every: 1
  resume_latest: true
  replay_window_shards: 4
  replay_window_items: 0

evaluation:
  rounds: 8
  seed: 10000
  seed_sequence: []
  checkpoint: "checkpoints/latest.pt"
  baseline_checkpoint: null
  use_search: true
  search_simulations: 12
  rollout_depth: 16
  num_determinizations: 4
  seed_steps: 200
  mode: "auto"
  suite_name: "quick"
  opponent_pool_size: 3
  include_anchor: true
  include_previous_snapshot: true
  duplicate_draw_margin: 0.0
  rating_k_factor: 24.0
