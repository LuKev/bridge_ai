model:
  action_vocab_size: 40
  hidden_dim: 128
  num_layers: 4
  num_heads: 4
  dropout: 0.1
  max_seq_len: 128
  owner_classes: 4

selfplay:
  seed: 42
  output_path: "replays/latest.json"
  data_sources:
    - "tests/fixtures/real_lin_records.txt"
  max_games: 20
  holdout_fraction: 0.2

storage:
  replay_dir: "replays"
  checkpoint_dir: "checkpoints"
  artifacts_dir: "artifacts"
  manifest_path: "artifacts/manifest.json"

training:
  epochs: 4
  batch_size: 32
  iterations: 1
  lr: 0.0003
  replay_path: "replays/latest.json"
  init_checkpoint: null
  checkpoint_name: "latest.pt"
  ckpt_dir: "checkpoints"
  device: "cpu"

evaluation:
  checkpoint: "checkpoints/latest.pt"
  replay_path: "replays/latest.json"
  max_examples: 64
  preview_examples: 3
  sample_count: 4

pipeline:
  iterations: 1
