modal:
  app_name: "bridge-ai"
  volume_name: "bridge-ai-artifacts"
  mount_path: "/vol/bridge-ai"

compute:
  selfplay_cpu: 8
  trainer_gpu: "A100"
  evaluator_cpu: 2
  use_spot: false

model:
  vocab_size: 2000
  action_vocab_size: 260
  phase_vocab_size: 4
  hidden_dim: 128
  num_layers: 4
  num_heads: 4
  dropout: 0.1
  max_seq_len: 256
  use_auxiliary_heads: false

storage:
  checkpoint_dir: "/vol/bridge-ai/checkpoints/scale5x"
  replay_dir: "/vol/bridge-ai/replays/scale5x"
  artifacts_dir: "/vol/bridge-ai/artifacts/scale5x"
  manifest_path: "/vol/bridge-ai/artifacts/scale5x/manifest.json"

selfplay:
  num_episodes: 40
  max_steps: 80
  seed: 101
  output_path: "/vol/bridge-ai/replays/scale5x/latest.json"
  checkpoint: null
  determinization_count: 1
  num_determinizations: 1
  search_simulations: 0
  rollout_depth: 1
  use_search: false
  use_model_logits: true

training:
  epochs: 1
  batch_size: 64
  iterations: 2000
  checkpoint_every: 100
  lr: 0.0001
  replay_path: "/vol/bridge-ai/replays/scale5x/latest.json"
  init_checkpoint: null
  checkpoint_name: "latest.pt"
  ckpt_dir: "/vol/bridge-ai/checkpoints/scale5x"
  device: "cuda"
  online_refresh: false
  online_refresh_every: 1

evaluation:
  rounds: 20
  seed: 101
  checkpoint: "/vol/bridge-ai/checkpoints/scale5x/latest.pt"
  baseline_checkpoint: null
  use_search: false
  search_simulations: 0
  rollout_depth: 1
  num_determinizations: 1
  seed_steps: 200

pipeline:
  iterations: 1
