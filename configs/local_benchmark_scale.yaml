compute:
  device: "cpu"
  num_workers: 1
  max_parallel_games: 2

model:
  vocab_size: 2000
  action_vocab_size: 260
  phase_vocab_size: 4
  hidden_dim: 128
  num_layers: 4
  num_heads: 4
  dropout: 0.1
  max_seq_len: 256
  use_auxiliary_heads: false

selfplay:
  num_episodes: 8
  max_steps: 80
  seed: 17
  seed_sequence:
    - 17
    - 18
    - 19
    - 20
    - 21
    - 22
    - 23
    - 24
  output_path: "replays/local_benchmark_scale/latest.json"
  checkpoint: null
  determinization_count: 1
  num_determinizations: 1
  search_simulations: 0
  rollout_depth: 1
  use_search: false
  use_model_logits: true

storage:
  replay_dir: "replays/local_benchmark_scale"
  checkpoint_dir: "checkpoints/local_benchmark_scale"
  artifacts_dir: "artifacts/local_benchmark_scale"
  manifest_path: "artifacts/local_benchmark_scale/manifest.json"

training:
  epochs: 1
  batch_size: 64
  iterations: 400
  checkpoint_every: 100
  lr: 0.0001
  replay_path: "replays/local_benchmark_scale/latest.json"
  init_checkpoint: null
  checkpoint_name: "latest.pt"
  ckpt_dir: "checkpoints/local_benchmark_scale"
  device: "cpu"
  online_refresh: false
  online_refresh_every: 1

evaluation:
  rounds: 4
  seed: 17
  seed_sequence:
    - 17
    - 18
    - 19
    - 20
  checkpoint: "checkpoints/local_benchmark_scale/latest.pt"
  baseline_checkpoint: null
  use_search: false
  search_simulations: 0
  rollout_depth: 1
  num_determinizations: 1
  seed_steps: 200

pipeline:
  iterations: 1
