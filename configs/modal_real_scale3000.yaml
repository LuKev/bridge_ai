logging:
  run_name: "bridge-ai-modal-scale3000"

model:
  vocab_size: 2000
  action_vocab_size: 260
  phase_vocab_size: 4
  hidden_dim: 128
  num_layers: 4
  num_heads: 4
  dropout: 0.1
  max_seq_len: 256
  use_auxiliary_heads: false

selfplay:
  num_episodes: 8
  max_steps: 80
  seed: 7
  seed_sequence:
    - 7
    - 8
    - 9
    - 10
    - 11
    - 12
    - 13
    - 14
  output_path: "replays/modal_real_scale3000/latest.json"
  checkpoint: null
  determinization_count: 1
  num_determinizations: 1
  search_simulations: 0
  rollout_depth: 1
  use_search: false
  use_model_logits: true
  keep_last_shards: 8

storage:
  replay_dir: "replays/modal_real_scale3000"
  checkpoint_dir: "checkpoints/modal_real_scale3000"
  artifacts_dir: "artifacts/modal_real_scale3000"
  manifest_path: "artifacts/modal_real_scale3000/manifest.json"

training:
  epochs: 1
  batch_size: 64
  iterations: 200
  checkpoint_every: 200
  snapshot_every: 200
  save_final_snapshot: true
  lr: 0.0001
  replay_path: "replays/modal_real_scale3000/latest.json"
  init_checkpoint: null
  checkpoint_name: "latest.pt"
  ckpt_dir: "checkpoints/modal_real_scale3000"
  device: "cpu"
  online_refresh: false
  online_refresh_every: 1
  resume_latest: true
  replay_window_shards: 4
  replay_window_items: 0

evaluation:
  rounds: 8
  seed: 10000
  seed_sequence: []
  checkpoint: "checkpoints/modal_real_scale3000/latest.pt"
  baseline_checkpoint: null
  use_search: false
  search_simulations: 0
  rollout_depth: 1
  num_determinizations: 1
  seed_steps: 200
  mode: "auto"
  suite_name: "quick"
  opponent_pool_size: 3
  include_anchor: true
  include_previous_snapshot: true
  duplicate_draw_margin: 0.0
  rating_k_factor: 24.0

pipeline:
  iterations: 5

modal:
  app_name: "bridge-ai"
  volume_name: "bridge-ai-local-real-scale3000"
  volume_mount_path: "/mnt/bridge_ai"
  remote_root: "runs/local_real_scale3000"
  timeout_seconds: 43200
  cpu: 32
  gpu: null
  bootstrap_checkpoint: "/Users/kevin/projects/bridge_ai/checkpoints/local_real_scale2000/latest.pt"
  bootstrap_iteration: 1999
  bootstrap_snapshot_tag: "iter_002000"
  target_step: 3000
  force_bootstrap: false
  sync_back: true
  nonpreemptible: false

league:
  enabled: true
  suite_name: "gating"
  rounds: 32
  output_dir: "artifacts/modal_real_scale3000/league"
  initial_checkpoint: "checkpoints/modal_real_scale3000_initial/latest.pt"
  initial_seed: 0
  initial_snapshot_tag: "iter_000000"
  participants:
    - name: "initial"
      checkpoint: "checkpoints/modal_real_scale3000_initial/latest.pt"
    - name: "scale2000"
      checkpoint: "checkpoints/modal_real_scale3000/iter_002000.pt"
    - name: "scale3000"
      checkpoint: "checkpoints/modal_real_scale3000/latest.pt"
