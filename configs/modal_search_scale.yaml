modal:
  app_name: "bridge-ai"
  volume_name: "bridge-ai-artifacts"
  mount_path: "/vol/bridge-ai"

compute:
  selfplay_cpu: 8
  trainer_gpu: "A100"
  evaluator_cpu: 2
  use_spot: false

model:
  vocab_size: 2000
  action_vocab_size: 260
  phase_vocab_size: 4
  hidden_dim: 128
  num_layers: 4
  num_heads: 4
  dropout: 0.1
  max_seq_len: 256
  use_auxiliary_heads: false

storage:
  checkpoint_dir: "/vol/bridge-ai/checkpoints/search_scale"
  replay_dir: "/vol/bridge-ai/replays/search_scale"
  artifacts_dir: "/vol/bridge-ai/artifacts/search_scale"
  manifest_path: "/vol/bridge-ai/artifacts/search_scale/manifest.json"

selfplay:
  num_episodes: 16
  max_steps: 80
  seed: 61
  seed_sequence:
    - 61
    - 62
    - 63
    - 64
    - 65
    - 66
    - 67
    - 68
    - 69
    - 70
    - 71
    - 72
    - 73
    - 74
    - 75
    - 76
  output_path: "/vol/bridge-ai/replays/search_scale/latest.json"
  checkpoint: "/vol/bridge-ai/checkpoints/search_baseline/latest.pt"
  determinization_count: 2
  num_determinizations: 2
  search_simulations: 8
  rollout_depth: 8
  use_search: true
  use_model_logits: true

training:
  epochs: 1
  batch_size: 64
  iterations: 400
  checkpoint_every: 100
  lr: 0.0001
  replay_path: "/vol/bridge-ai/replays/search_scale/latest.json"
  init_checkpoint: "/vol/bridge-ai/checkpoints/search_baseline/latest.pt"
  checkpoint_name: "latest.pt"
  ckpt_dir: "/vol/bridge-ai/checkpoints/search_scale"
  device: "cuda"
  online_refresh: false
  online_refresh_every: 1

evaluation:
  rounds: 20
  seed: 61
  seed_sequence:
    - 61
    - 62
    - 63
    - 64
    - 65
    - 66
    - 67
    - 68
    - 69
    - 70
    - 71
    - 72
    - 73
    - 74
    - 75
    - 76
    - 77
    - 78
    - 79
    - 80
  checkpoint: "/vol/bridge-ai/checkpoints/search_scale/latest.pt"
  baseline_checkpoint: "/vol/bridge-ai/checkpoints/search_baseline/latest.pt"
  use_search: true
  search_simulations: 8
  rollout_depth: 8
  num_determinizations: 2
  seed_steps: 200

pipeline:
  iterations: 1
