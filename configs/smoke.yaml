compute:
  device: "cpu"

model:
  action_vocab_size: 40
  hidden_dim: 64
  num_layers: 2
  num_heads: 2
  dropout: 0.1
  max_seq_len: 96
  owner_classes: 4

selfplay:
  seed: 7
  output_path: "replays/smoke/latest.json"
  data_sources:
    - "tests/fixtures/real_lin_records.txt"
  max_games: 8
  holdout_fraction: 0.25

storage:
  replay_dir: "replays/smoke"
  checkpoint_dir: "checkpoints/smoke"
  artifacts_dir: "artifacts/smoke"
  manifest_path: "artifacts/smoke/manifest.json"

training:
  epochs: 2
  batch_size: 16
  iterations: 1
  lr: 0.0005
  replay_path: "replays/smoke/latest.json"
  init_checkpoint: null
  checkpoint_name: "latest.pt"
  ckpt_dir: "checkpoints/smoke"
  device: "cpu"

evaluation:
  checkpoint: "checkpoints/smoke/latest.pt"
  replay_path: "replays/smoke/latest.json"
  max_examples: 32
  preview_examples: 3
  sample_count: 4

pipeline:
  iterations: 1
