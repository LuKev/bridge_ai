model:
  action_vocab_size: 40
  hidden_dim: 96
  num_layers: 3
  num_heads: 4
  dropout: 0.1
  max_seq_len: 128
  owner_classes: 4

selfplay:
  seed: 42
  output_path: "replays/bootstrap1000/latest.json"
  archive_url: "https://github.com/ureshvahalia/bridge_deals_db/releases/download/v1.0/bridge_deals.tar.gz"
  event_files:
    - "JSON/WBF/2023/BermudaBowl2023.json"
    - "JSON/WBF/2023/VeniceCup2023.json"
    - "JSON/WBF/2023/dOrsiTrophy2023.json"
    - "JSON/WBF/2023/WuhanCup2023.json"
  max_games: 1000
  records_per_event: 250
  holdout_fraction: 0.2
  cache_dir: "artifacts/bootstrap1000/cache"
  extract_dir: "artifacts/bootstrap1000/extract"

storage:
  replay_dir: "replays/bootstrap1000"
  checkpoint_dir: "checkpoints/bootstrap1000"
  artifacts_dir: "artifacts/bootstrap1000"
  manifest_path: "artifacts/bootstrap1000/manifest.json"

training:
  epochs: 8
  batch_size: 64
  iterations: 1
  lr: 0.0003
  replay_path: "replays/bootstrap1000/latest.json"
  init_checkpoint: null
  checkpoint_name: "latest.pt"
  ckpt_dir: "checkpoints/bootstrap1000"
  device: "cpu"
  eval_every_epochs: 1
  holdout_max_examples: 512
  holdout_sample_count: 1

evaluation:
  checkpoint: "checkpoints/bootstrap1000/latest.pt"
  replay_path: "replays/bootstrap1000/latest.json"
  max_examples: 512
  preview_examples: 5
  sample_count: 4

pipeline:
  iterations: 1
